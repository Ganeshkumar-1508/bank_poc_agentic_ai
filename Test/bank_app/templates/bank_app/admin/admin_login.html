{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bank POC Agentic AI</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #080d18 0%, #0e1525 100%);
        }
        
        .login-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease both;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .login-logo span {
            color: var(--gold);
        }
        
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--muted);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--bg);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--gold-glow);
        }
        
        .error-message {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--red);
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--muted);
        }
        
        .login-footer a {
            color: var(--gold);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">Bank<span>POC</span></div>
            <div class="login-subtitle">Admin Panel Login</div>
        </div>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{% url 'admin_panel:admin_login' %}">
        {% csrf_token %}
        <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" required placeholder="Enter admin username">
        </div>
        
        <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" required placeholder="Enter admin password">
        </div>
        
        <button type="submit" class="btn-login">Login to Admin Panel</button>
        </form>
        
        <div class="login-footer">
            <a href="{% url 'home' %}">← Back to Main Site</a>
        </div>
    </div>
</body>
</html>
